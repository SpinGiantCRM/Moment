[project]
name = "moment"
version = "0.1.0"
description = "GPU-accelerated game clip manager for Linux. Capture, edit, and share your gaming moments."
requires-python = ">=3.11"
authors = [{ name = "chasem" }]
license = { text = "GPL-3.0" }

dependencies = [
    "PyQt6",
    "PyQt6-Qt6",
    "PyQt6-sip",
]

[project.optional-dependencies]
bot = ["discord.py>=2.4"]
mcp = ["fastmcp>=1.0"]
all = ["moment[bot,mcp]"]

[project.scripts]
moment = "moment.main:main"
moment-bot = "moment.bot.main:run_bot"
moment-mcp = "moment.mcp.main:run_mcp"

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["moment*"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.format]
line-ending = "lf"

[tool.bandit]
skips = ["B101", "B311", "B404", "B603"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
