name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ---------------------------------------------------------------------------
  # Lint — runs first, gates everything else
  # ---------------------------------------------------------------------------
  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"

      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  # ---------------------------------------------------------------------------
  # Fast — unit tests (no GUI, no integration, no slow, no external)
  # ---------------------------------------------------------------------------
  fast:
    name: "Fast (py${{ matrix.python-version }})"
    runs-on: ubuntu-24.04
    needs: lint
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (SQLite encryption)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsqlcipher-dev

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[all] pytest pytest-cov

      - name: Run fast tests
        run: |
          python -m pytest -m "not gui and not integration and not slow and not external" \
            --tb=short -q \
            ${{ matrix.python-version == '3.13' && '--cov=moment --cov-report=term --cov-report=xml' || '' }}

      - name: Upload coverage artifact (3.13 only)
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # GUI — Qt widget / display-dependent tests
  # ---------------------------------------------------------------------------
  gui:
    name: "GUI (py${{ matrix.python-version }})"
    runs-on: ubuntu-24.04
    needs: lint
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Qt + SQLite encryption)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libegl1 \
            libxkbcommon0 \
            libfontconfig1 \
            libsqlcipher-dev \
            xvfb

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[all] pytest

      - name: Run GUI tests
        run: |
          QT_QPA_PLATFORM=offscreen xvfb-run \
            python -m pytest -m gui --tb=short -q

  # ---------------------------------------------------------------------------
  # Integration — filesystem / threads / DB workflows (no external services)
  # ---------------------------------------------------------------------------
  integration:
    name: "Integration (py${{ matrix.python-version }})"
    runs-on: ubuntu-24.04
    needs: lint
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (SQLite encryption)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsqlcipher-dev

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[all] pytest

      - name: Run integration tests
        run: |
          python -m pytest -m "integration and not external" --tb=short -q

  # ---------------------------------------------------------------------------
  # Smoketest — verifies the installed package works end-to-end
  # ---------------------------------------------------------------------------
  smoketest:
    name: "Smoketest"
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsqlcipher-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install via pipx (recommended user method)
        run: |
          pip install pipx
          pipx install ".[mcp]"

      - name: Smoke test — --version
        run: pipx run --spec "." moment --version

      - name: Smoke test — --help
        run: pipx run --spec "." moment --help | head -10

      - name: Smoke test — MCP subcommand
        run: pipx run --spec "." moment mcp --help | head -10

  # ---------------------------------------------------------------------------
  # Security — bandit scan + dependency audit
  # ---------------------------------------------------------------------------
  security:
    name: "Security (bandit + pip-audit)"
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml

      - name: Run pip-audit
        run: pip-audit
