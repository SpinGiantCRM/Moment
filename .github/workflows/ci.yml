name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

jobs:
  # ---------------------------------------------------------------------------
  # Lint — runs first, gates everything else
  # ---------------------------------------------------------------------------
  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"

      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  # ---------------------------------------------------------------------------
  # Test — runs on a Python version matrix with xvfb for Qt GUI tests
  # ---------------------------------------------------------------------------
  test:
    name: "Test (py${{ matrix.python-version }})"
    runs-on: ubuntu-24.04
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Qt + SQLite encryption)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libegl1 \
            libxkbcommon0 \
            libfontconfig1 \
            libsqlcipher-dev \
            xvfb

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[all] pytest pytest-cov

      - name: Run tests
        run: |
          xvfb-run pytest tests/ \
            -x --tb=short -q \
            --cov=moment \
            --cov-report=term \
            --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Smoketest — verifies the installed package works end-to-end
  # ---------------------------------------------------------------------------
  smoketest:
    name: "Smoketest"
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsqlcipher-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install via pipx (recommended user method)
        run: |
          pip install pipx
          pipx install ".[mcp]"

      - name: Smoke test — --version
        run: pipx run --spec "." moment --version

      - name: Smoke test — --help
        run: pipx run --spec "." moment --help | head -10

      - name: Smoke test — MCP subcommand
        run: pipx run --spec "." moment mcp --help | head -10

  # ---------------------------------------------------------------------------
  # Security — bandit scan
  # ---------------------------------------------------------------------------
  security:
    name: "Security (bandit)"
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml
