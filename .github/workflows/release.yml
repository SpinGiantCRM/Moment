name: Release

# Triggered manually (workflow_dispatch) or when a version tag is pushed.
# Builds a wheel + sdist, publishes to PyPI, and creates a GitHub Release.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write                          # needed for PyPI trusted publishing

jobs:
  # ---------------------------------------------------------------------------
  # Build — produce wheel and sdist
  # ---------------------------------------------------------------------------
  build:
    name: "Build wheel + sdist"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          pip install --upgrade pip build

      - name: Build wheel + sdist
        run: python -m build --wheel --sdist

      - name: Verify wheel contents
        run: |
          echo "=== sdist ==="
          tar tzf dist/*.tar.gz | head -20
          echo ""
          echo "=== wheel ==="
          unzip -l dist/*.whl | head -40

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Publish to PyPI — via trusted publishing (OIDC)
  # ---------------------------------------------------------------------------
  publish:
    name: "Publish to PyPI"
    needs: build
    runs-on: ubuntu-24.04
    # Only on tag push, not manual dispatch
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/moment-clips/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@v1.12

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: "Create GitHub Release"
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## Moment v${{ steps.version.outputs.version }}

            GPU-accelerated game clip manager for Linux.

            ### Installation

            **System dependencies:**

            ```bash
            # Debian / Ubuntu
            sudo apt install libsqlcipher-dev ffmpeg

            # Arch
            sudo pacman -S sqlcipher ffmpeg
            ```

            **Recommended — pipx (isolated):**

            ```bash
pipx install "moment-clips==${{ steps.version.outputs.version }}[mcp,bot]"

**pip (system-wide):**

```bash
pip install "moment-clips==${{ steps.version.outputs.version }}[mcp,bot]"
            ```

            **Desktop integration (icons + .desktop):**

            ```bash
            curl -fsSL https://raw.githubusercontent.com/SpinGiantCRM/moment/v${{ steps.version.outputs.version }}/install/install.sh | bash
            ```

            ### What's Changed

            See the [commit history](https://github.com/SpinGiantCRM/moment/commits/v${{ steps.version.outputs.version }}) for details.
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
