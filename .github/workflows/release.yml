name: Release

# Triggered manually (workflow_dispatch) or when a version tag is pushed.
# Preflight runs tests + build + twine check before any publish step.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Preflight — tests + build + twine check before publishing
  # ---------------------------------------------------------------------------
  preflight:
    name: "Preflight (test + build + twine)"
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (SQLite encryption)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsqlcipher-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[all] pytest build twine

      - name: Run tests (exclude external)
        run: |
          python -m pytest -m "not external" --tb=short -q

      - name: Build wheel + sdist
        run: python -m build --wheel --sdist

      - name: Twine check
        run: python -m twine check dist/*

      - name: Verify wheel contents
        run: |
          echo "=== sdist ==="
          tar tzf dist/*.tar.gz | head -20
          echo ""
          echo "=== wheel ==="
          unzip -l dist/*.whl | head -40

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Publish to PyPI — via API token
  # ---------------------------------------------------------------------------
  publish:
    name: "Publish to PyPI"
    needs: preflight
    runs-on: ubuntu-24.04
    # Only on tag push, not manual dispatch
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload to PyPI
        run: |
          pip install twine
          twine upload dist/* \
            --username __token__ \
            --password ${{ secrets.PYPI_TOKEN }}

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: "Create GitHub Release"
    needs: preflight
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## Moment v${{ steps.version.outputs.version }}

            GPU-accelerated game clip manager for Linux.

            ### Installation

            **System dependencies:**

            ```bash
            # Debian / Ubuntu
            sudo apt install libsqlcipher-dev ffmpeg
            # Arch
            sudo pacman -S sqlcipher ffmpeg
            ```

            **Recommended — pipx (isolated):**

            ```bash
            pipx install "moment-clips==${{ steps.version.outputs.version }}[mcp,bot]"
            ```

            **pip (system-wide):**

            ```bash
            pip install "moment-clips==${{ steps.version.outputs.version }}[mcp,bot]"
            ```

            **Desktop integration (icons + .desktop):**

            ```bash
            curl -fsSL https://raw.githubusercontent.com/SpinGiantCRM/moment/v${{ steps.version.outputs.version }}/install/install.sh | bash
            ```

            ### What's Changed

            See the [commit history](https://github.com/SpinGiantCRM/moment/commits/v${{ steps.version.outputs.version }}) for details.
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
