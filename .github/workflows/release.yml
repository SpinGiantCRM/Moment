name: Release

# Triggered manually (workflow_dispatch) or when a version tag is pushed.
# Preflight runs tests + build + twine check before any publish step.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Preflight — tests + build + twine check before publishing
  # ---------------------------------------------------------------------------
  preflight:
    name: "Preflight (test + build + twine)"
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (SQLite encryption)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsqlcipher-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[all] pytest build twine

      - name: Run tests (exclude external)
        run: |
          python -m pytest -m "not external" --tb=short -q

      - name: Build wheel + sdist
        run: python -m build --wheel --sdist

      - name: Twine check
        run: python -m twine check dist/*

      - name: Verify wheel contents
        run: |
          echo "=== sdist ==="
          tar tzf dist/*.tar.gz | head -20
          echo ""
          echo "=== wheel ==="
          unzip -l dist/*.whl | head -40

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Publish to PyPI — via API token
  # ---------------------------------------------------------------------------
  publish:
    name: "Publish to PyPI"
    needs: preflight
    runs-on: ubuntu-24.04
    # Only on tag push, not manual dispatch
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload to PyPI
        run: |
          pip install twine
          twine upload dist/* \
            --username __token__ \
            --password ${{ secrets.PYPI_TOKEN }}

  # ---------------------------------------------------------------------------
  # Auto-update PKGBUILD checksum after release is published
  # ---------------------------------------------------------------------------
  aur-update:
    name: "Update PKGBUILD checksums"
    needs: release
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Get version from tag
        id: version
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> "${GITHUB_OUTPUT}"
          echo "version_nov=${GITHUB_REF#refs/tags/}" >> "${GITHUB_OUTPUT}"

      - name: Download source tarball and compute checksum
        id: checksum
        run: |
          URL="https://github.com/SpinGiantCRM/moment/archive/refs/tags/${{ steps.version.outputs.version_nov }}.tar.gz"
          SUM=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=${SUM}" >> "${GITHUB_OUTPUT}"
          echo "Computed sha256sum: ${SUM}"

      - name: Update PKGBUILD
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" PKGBUILD
          sed -i "s/^sha256sums=('.*')/sha256sums=('${{ steps.checksum.outputs.sha256 }}')/" PKGBUILD
          cat PKGBUILD

      - name: Commit and push PKGBUILD update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD
          git diff --cached --quiet || git commit -m "chore: update PKGBUILD for v${{ steps.version.outputs.version }}"
          git push origin master

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: "Create GitHub Release"
    needs: preflight
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "${GITHUB_OUTPUT}"

      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous version tag, or use the first commit
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -2 | tail -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:'- %s' --no-merges | head -50)
          else
            LOG=$(git log --pretty=format:'- %s' --no-merges | head -50)
          fi
          # Escape multiline output for GitHub Actions
          echo "changelog<<EOF" >> "${GITHUB_OUTPUT}"
          echo "$LOG" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## Moment v${{ steps.version.outputs.version }}

            GPU-accelerated game clip manager for Linux.

            ### Installation

            **System dependencies:**

            ```bash
            # Debian / Ubuntu
            sudo apt install libsqlcipher-dev ffmpeg
            # Arch
            sudo pacman -S sqlcipher ffmpeg
            ```

            **Recommended — pipx (isolated):**

            ```bash
            pipx install "moment-clips==${{ steps.version.outputs.version }}[mcp,bot]"
            ```

            **pip (system-wide):**

            ```bash
            pip install "moment-clips==${{ steps.version.outputs.version }}[mcp,bot]"
            ```

            **Desktop integration (icons + .desktop):**

            ```bash
            curl -fsSL https://raw.githubusercontent.com/SpinGiantCRM/moment/v${{ steps.version.outputs.version }}/install/install.sh | bash
            ```

            ### What's Changed

            ${{ steps.changelog.outputs.changelog }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
